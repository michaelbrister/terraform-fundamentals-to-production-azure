name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Check Terraform formatting for valid roots
        shell: bash
        run: |
          set -euo pipefail

          roots=(
            "01-local-basics"
            "02-language-basics"
            "03-for-each-patterns"
            "04-dynamic-patterns"
            "07-modules"
            "08-terraform-console"
            "09-refactor-state/step1"
            "09-refactor-state/step2"
            "09-refactor-state/step3"
            "09-refactor-state/step4"
            "09-refactor-state/step5"
            "10-breakfix/scenario-02-identity-instability"
            "10-breakfix/scenario-03-drift"
            "10-breakfix/scenario-04-locks-and-partial-ops"
            "10-breakfix/scenario-05-import-vs-recreate"
            "12-exam-drills/drill-02-count-to-for_each-no-recreate"
            "12-exam-drills/drill-03-for_each-key-stability"
            "12-exam-drills/drill-04-dynamic-optional"
            "12-exam-drills/drill-09-provider-version-conflict"
            "13-state-subcommands"
            "live/dev"
            "live/stage"
            "live/prod"
            "modules/app_stack"
          )

          for root in "${roots[@]}"; do
            terraform -chdir="$root" fmt -check
          done

      - name: Validate Terraform roots
        shell: bash
        run: |
          set -euo pipefail

          roots=(
            "01-local-basics"
            "02-language-basics"
            "03-for-each-patterns"
            "04-dynamic-patterns"
            "07-modules"
            "08-terraform-console"
            "09-refactor-state/step1"
            "09-refactor-state/step2"
            "09-refactor-state/step3"
            "09-refactor-state/step4"
            "09-refactor-state/step5"
            "10-breakfix/scenario-02-identity-instability"
            "10-breakfix/scenario-03-drift"
            "10-breakfix/scenario-04-locks-and-partial-ops"
            "10-breakfix/scenario-05-import-vs-recreate"
            "12-exam-drills/drill-02-count-to-for_each-no-recreate"
            "12-exam-drills/drill-03-for_each-key-stability"
            "12-exam-drills/drill-04-dynamic-optional"
            "13-state-subcommands"
            "live/dev"
            "live/stage"
            "live/prod"
            "modules/app_stack"
          )

          for root in "${roots[@]}"; do
            terraform -chdir="$root" init -backend=false -input=false
            terraform -chdir="$root" validate
          done

      - name: Check intentional Terraform failures
        shell: bash
        run: |
          set -euo pipefail

          terraform -chdir="10-breakfix/scenario-01-parse-error" validate >parse.out 2>&1 && {
            cat parse.out
            echo "Expected parse error scenario to fail."
            exit 1
          }
          grep -q "Missing attribute separator" parse.out

          terraform -chdir="12-exam-drills/drill-10-dependency-cycle" validate >cycle.out 2>&1 && {
            cat cycle.out
            echo "Expected dependency cycle drill to fail."
            exit 1
          }
          grep -q "Cycle" cycle.out

      - name: Check provider version drill initialization
        shell: bash
        run: |
          set -euo pipefail

          terraform -chdir="12-exam-drills/drill-09-provider-version-conflict" init -backend=false -input=false
          terraform -chdir="12-exam-drills/drill-09-provider-version-conflict" version

  go:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: "11-terratest/test/go.sum"

      - name: Run default Terratest suite
        working-directory: 11-terratest/test
        run: go test -v -timeout 5m
