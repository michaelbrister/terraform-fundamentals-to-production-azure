name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.5

      - name: Run Terraform smoke checks
        shell: bash
        run: bash scripts/preview-smoke.sh --skip-go

  go:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: "11-terratest/test/go.sum"

      - name: Run default Terratest suite
        working-directory: 11-terratest/test
        run: go test -v -timeout 5m
